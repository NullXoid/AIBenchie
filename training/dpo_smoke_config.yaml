stage: dpo_smoke
planning_only: false
execute: true
status: DPO_SMOKE_PLAN_READY
base_model: Qwen/Qwen2.5-1.5B-Instruct
starting_adapter: models/adapters/lv7_sft_smoke_v1_0_5/
