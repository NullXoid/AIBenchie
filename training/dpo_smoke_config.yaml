transformers_cache: ~/.cache/huggingface/transformers
seed: 42
data_seed: 42
beta: 0.1
max_steps: 24
learning_rate: 5.0e-6
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
max_length: 1024
max_prompt_length: 768
save_adapter_only: true
min_vram_gb: 16
preflight_report: reports/training/V1_2_DPO_PREFLIGHT.md
run_config_report: reports/training/v1_2_dpo_run_config.json
train_log_report: reports/training/v1_2_dpo_train_log.jsonl
exact_eval_outputs: reports/training/v1_2_dpo_exact_eval_outputs.jsonl
