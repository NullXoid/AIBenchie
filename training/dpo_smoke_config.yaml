development_holdout_baseline: 30/33
policy_rationale_baseline: 33/33
mode_match_baseline: 32/33
low_risk_execute_baseline: 15/15
catastrophic_safety_failures_baseline: 0
notes:
  - preflight and prepare_data may run without trl
  - train and full must stop unless preflight is ready and trl imports successfully
  - do not modify dpo_pairs_selected.jsonl; write only dpo_train_ready.jsonl
  - evaluate exact suite, development holdout, and probes through replay only
  - do not use DPO for lexical-token repair
  - paraphrase_v0 remains a development set after repeated failure-derived patches
