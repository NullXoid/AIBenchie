name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: runner-ci-trusted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest tests/test_release_fabric.py tests/test_run_test_suite.py
