name: aibenchie

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verdict:
    runs-on: runner-aibenchie
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - run: python training/run_test_suite.py --suite benchmark_smoke --no-record
      - run: python training/run_test_suite.py --suite release_fabric --no-record
